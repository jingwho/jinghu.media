name: Update Substack RSS

on:
  schedule:
    - cron: "7 */2 * * *"   # every 2 hours at :07 (off the hour to avoid Actions queue spikes)
  workflow_dispatch:         # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Substack RSS and write posts.json
        run: |
          python3 - <<'PY'
          import urllib.request, json, xml.etree.ElementTree as ET
          from email.utils import parsedate_to_datetime

          FEED = "https://www.2ndorderthinkers.com/feed"
          req = urllib.request.Request(FEED, headers={"User-Agent": "Mozilla/5.0"})
          root = ET.fromstring(urllib.request.urlopen(req, timeout=20).read())
          items = root.find("channel").findall("item")[:5]

          out = []
          for it in items:
              d = parsedate_to_datetime(it.findtext("pubDate"))
              out.append({
                  "title": it.findtext("title"),
                  "url":   it.findtext("link"),
                  "date":  d.strftime("%-d %b %Y"),
              })

          with open("posts.json", "w", encoding="utf-8") as f:
              json.dump(out, f, indent=2, ensure_ascii=False)
          PY

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "chore: refresh posts.json"
          git push
